name: Yahoo board monitor policy24

on:
  repository_dispatch:
    types:
      - policy24_monitor

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yahoo-board-monitor-policy24
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: policy24モニターを実行します
        env:
          # GitHub Secret名はIFTTT_WEBHOOK_KEYのままでよい
          # Python側にはIFTTT_KEYとして渡す
          IFTTT_KEY: ${{ secrets.IFTTT_WEBHOOK_KEY }}

          # IFTTTアプレットのイベント名
          IFTTT_EVENT: "yahoo_board_spike"

        run: |
          python monitor_policy24.py

      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -f data/state.json ]; then
            echo "data/state.json does not exist"
            exit 0
          fi

          git add -f data/state.json

          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "Update policy24 board monitor state"
            git push
          fi
